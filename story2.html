<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass of Emotion - Story 2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container page-story2" onclick="revealContent()">
        
        <div class="header-top">
            <div class="sound-icon" style= "visibility: hidden;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </div>
        </div>

        <h1 class="app-title">GLASS OF EMOTION</h1>

        <div class="content-story2-wrapper">

            <p id="tapHint" class="tap-hint" style="position: absolute; top: 269px; left: 0; width: 100%; text-align: center; margin: 0; z-index: 10;">
    (แตะหน้าจอเพื่อไปต่อ)</p>
            
            <p class="story-desc hidden" id="text1">
                มีเพียงคุณและพื้นที่ปลอดภัย
            </p>

            <p class="story-desc hidden" id="text2">
                ที่เปิดโอกาสให้คุณได้เข้าใจอารมณ์ของตัวเอง
            </p>

            <p class="story-desc hidden" id="text3">
                อย่างลึกซึ้ง
            </p>

            <button id="nextBtn" class="next-btn hidden" onclick="goToNextStep(); event.stopPropagation();">ถัดไป</button>

        </div>


    </div>

    <script src="script.js"></script>
    <script>
        let isRevealed = false;

        function revealContent() {
            if (!isRevealed) {
                // เรียกข้อความทุกบรรทัดและปุ่มให้ขึ้นมา "พร้อมกันทั้งหมด"
                showElement('text1');
                showElement('text2');
                showElement('text3');
                showElement('nextBtn');

                // เปลี่ยนสถานะเพื่อบอกว่าเปิดแล้ว จะได้ไม่ทำงานซ้ำ
                isRevealed = true;
            }
        }

        function showElement(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.remove('hidden');
                el.classList.add('fade-in-up');
            }
        }

        function goToNextStep() {
            window.location.href = "story3.html"; 
        }
    </script>
    
</body>
</html>
