<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass of Emotion</title>
    <style>
        /* ล้างค่าเริ่มต้น และล็อกหน้าจอแม่ไม่ให้เลื่อน */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
        }

        /* ให้ iframe แสดงผลเต็มจอ โดยปล่อยให้เว็บข้างในจัดเลย์เอาต์ตามเดิม */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        /* กล่องล่องหนสำหรับล็อกปุ่มเสียงให้อยู่ในระยะ 430px */
        .sound-tracker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%); /* ดึงให้อยู่กึ่งกลางจอเป๊ะๆ */
            width: 100%;
            max-width: 430px; /* ขนาดกว้างสุดตามที่เว็บคุณตั้งไว้ */
            height: 0;
            z-index: 9999;
            pointer-events: none; /* ทำให้กดทะลุกล่องนี้ไปหาหน้าเว็บด้านล่างได้ */
        }

        /* ปุ่มเปิด-ปิดเสียง */
        .global-sound {
            position: absolute;
            top: 20px;
            right: 20px; /* เกาะขอบขวาของระยะ 430px เสมอ */
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #000;
            pointer-events: auto; /* สั่งให้ตัวปุ่มยังกดเปิด-ปิดเสียงได้ตามปกติ */
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="bg_music.mp3" type="audio/mpeg">
    </audio>

    <iframe src="start.html" name="mainContent"></iframe>

    <div class="sound-tracker">
        <div class="global-sound" onclick="toggleMusic()">
            <svg id="musicIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M9 9v6a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
            </svg>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        music.volume = 0.5; 

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>`;
            } else {
                music.pause();
                musicIcon.innerHTML = `<line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v6a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>`;
            }
        }
    </script>

</body>
</html>
